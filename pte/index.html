<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Periódica Fullscreen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tabela Periódica dos Elementos</h1>
        <p>Passe o mouse para destacar famílias • Clique para detalhes</p>
    </header>

    <main class="table-wrapper">
        <div id="periodic-table" class="periodic-table"></div>
    </main>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <span id="close-modal" class="close-button">&times;</span>
            <div class="modal-header">
                <div id="modal-el-box" class="element-box">
                    <span id="modal-number"></span>
                    <span id="modal-symbol"></span>
                </div>
                <div>
                    <h2 id="modal-name"></h2>
                    <p id="modal-category"></p>
                </div>
            </div>
            <div class="modal-body">
                <img id="modal-img" src="" alt="">
                <p id="modal-summary"></p>
                <div class="modal-info">
                    <p><strong>Massa:</strong> <span id="modal-mass"></span></p>
                    <p><strong>Fusão:</strong> <span id="modal-melt"></span></p>
                    <p><strong>Ebulição:</strong> <span id="modal-boil"></span></p>
                </div>
                <a id="modal-link" href="#" target="_blank">Ver na Wikipedia</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
