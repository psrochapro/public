<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Santa Catarina - Municípios</title>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Explorador de Municípios - SC</h1>
    </header>

    <div id="container">
        <div id="controles">
            <select id="select-mun">
                <option value="">Carregando municípios...</option>
            </select>
        </div>

        <div id="mapa-box">
            <svg id="svg-mapa" width="700" height="450"></svg>
        </div>

        <div id="info-box">
            <h2 id="nome-exibicao">Município</h2>
            <p id="codigo-exibicao">Código IBGE: -</p>
            <img id="bandeira" src="" alt="Bandeira">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
