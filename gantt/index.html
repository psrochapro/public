<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Cronograma | SPA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --danger: #e74c3c;
            --bg: #f4f7f9;
            --text: #2c3e50;
            --border: #dcdfe3;
            --white: #ffffff;
            --placeholder: #aab2bd;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; line-height: 1.6; }
        .app-container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        h1 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            outline: none; 
            padding: 10px; 
            border-radius: 8px; 
            transition: all 0.3s;
            display: inline-block;
            min-width: 300px;
        }
        h1:empty:before { content: "Digite o título do projeto..."; color: var(--placeholder); font-weight: 300; }
        h1:hover { background: rgba(74, 144, 226, 0.05); }
        h1:focus { background: white; box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2); }
        
        .subtitle { color: var(--placeholder); font-size: 1.1rem; margin-top: -10px; }

        /* Toolbar */
        .toolbar { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600; 
            transition: all 0.2s; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #f8f9fa; border-color: #ccd1d9; }
        .btn-danger { background: #fff5f5; color: var(--danger); border: 1px solid #fed7d7; }
        .btn-danger:hover { background: #feb2b2; }

        /* Gantt Chart Area */
        .gantt-wrapper { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            overflow-x: auto; 
            margin-bottom: 40px; 
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }
        .gantt-container { position: relative; min-width: 1000px; }
        
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: var(--placeholder); 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 15px;
        }
        .empty-state-icon { font-size: 48px; opacity: 0.3; }

        /* Gantt Grid */
        .gantt-header-months { display: flex; margin-left: 280px; border-bottom: 2px solid var(--bg); margin-bottom: 10px; }
        .month-col { flex: 1; text-align: center; font-size: 11px; padding: 15px 0; color: #a0aec0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .gantt-row { display: flex; height: 50px; align-items: center; border-bottom: 1px solid var(--bg); }
        .task-label { width: 280px; font-size: 13px; padding-right: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; color: #4a5568; }
        .timeline-area { position: relative; flex-grow: 1; height: 100%; }
        .bar { 
            position: absolute; 
            height: 28px; 
            top: 11px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            color: white; 
            font-size: 11px; 
            font-weight: 600; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.07); 
            white-space: nowrap;
            transition: transform 0.2s;
        }
        .bar:hover { transform: scaleY(1.1); z-index: 20; }
        .today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--danger); z-index: 10; pointer-events: none; opacity: 0.6; }

        /* Editor Section */
        .editor-section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; margin-bottom: 25px; font-weight: 700; color: #2d3748; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 15px; font-size: 12px; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; border-bottom: 2px solid var(--bg); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--bg); }
        
        input[type="text"], input[type="date"] { 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            border-radius: 6px; 
            width: 90%; 
            font-size: 14px; 
            transition: border-color 0.2s;
            color: #4a5568;
        }
        input:focus { border-color: var(--primary); outline: none; }
        input[type="color"] { border: none; width: 32px; height: 32px; cursor: pointer; background: none; padding: 0; }

        @media (max-width: 768px) {
            .gantt-wrapper { padding: 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 id="main-title" contenteditable="true"></h1>
        <p class="subtitle">Planejamento Visual e Gestão de Tempo</p>
    </header>

    <section class="toolbar">
        <button onclick="addTask()" class="btn btn-primary"><span>+</span> Nova Atividade</button>
        <button onclick="exportToPNG()" class="btn btn-secondary">Download Imagem</button>
        <button onclick="exportToJSON()" class="btn btn-secondary">Exportar Dados</button>
        <label for="import-json" class="btn btn-secondary" style="cursor:pointer">Importar JSON</label>
        <input type="file" id="import-json" accept=".json" style="display:none" onchange="importFromJSON(event)">
        <button onclick="resetData()" class="btn btn-danger">Limpar Tudo</button>
    </section>

    <div id="gantt-capture-area" class="gantt-wrapper">
        <div class="gantt-container" id="gantt-container">
            <!-- Renderizado via JS -->
        </div>
    </div>

    <section class="editor-section">
        <h3>Quadro de Atividades</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width: 35%;">Descrição da Atividade</th>
                        <th>Categoria</th>
                        <th>Início</th>
                        <th>Término</th>
                        <th>Duração</th>
                        <th>Cor</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Renderizado via JS -->
                </tbody>
            </table>
        </div>
    </section>
</div>

<script>
    // Inicialização Profissional: Lista de tarefas vazia
    let tasks = [];

    window.onload = () => {
        const savedTasks = localStorage.getItem('gantt_pro_tasks');
        const savedTitle = localStorage.getItem('gantt_pro_title');
        
        if (savedTasks) {
            tasks = JSON.parse(savedTasks);
        }

        const titleEl = document.getElementById('main-title');
        if (savedTitle) {
            titleEl.innerText = savedTitle;
        }

        titleEl.addEventListener('blur', () => {
            localStorage.setItem('gantt_pro_title', titleEl.innerText);
        });

        render();
    };

    function render() {
        tasks.sort((a, b) => new Date(a.start) - new Date(b.start));
        renderTable();
        renderGantt();
        localStorage.setItem('gantt_pro_tasks', JSON.stringify(tasks));
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 40px; color: #a0aec0;">Nenhuma atividade para exibir. Clique em "+ Nova Atividade".</td></tr>`;
            return;
        }

        tasks.forEach((task, index) => {
            const d1 = new Date(task.start + "T00:00:00");
            const d2 = new Date(task.end + "T00:00:00");
            const diff = isNaN(d1) || isNaN(d2) ? 0 : Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" placeholder="Ex: Mapeamento de Processos" value="${task.name}" oninput="updateTask(${index}, 'name', this.value)"></td>
                <td><input type="text" placeholder="Categoria" value="${task.cat}" oninput="updateTask(${index}, 'cat', this.value)"></td>
                <td><input type="date" value="${task.start}" onchange="updateTask(${index}, 'start', this.value)"></td>
                <td><input type="date" value="${task.end}" onchange="updateTask(${index}, 'end', this.value)"></td>
                <td style="font-size:12px; font-weight:bold; color:#718096">${diff >= 0 ? diff : 0}d</td>
                <td><input type="color" value="${task.color || '#4a90e2'}" onchange="updateTask(${index}, 'color', this.value)"></td>
                <td><button onclick="removeTask(${index})" style="background:none; border:none; color:#cbd5e0; cursor:pointer; font-size:18px;">&times;</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderGantt() {
        const container = document.getElementById('gantt-container');
        container.innerHTML = '';

        if (tasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <strong>Seu gráfico aparecerá aqui</strong>
                    <span>Adicione atividades abaixo para começar a visualizar sua linha do tempo.</span>
                </div>`;
            return;
        }

        const allDates = tasks.flatMap(t => [new Date(t.start + "T00:00:00"), new Date(t.end + "T00:00:00")]);
        let minDate = new Date(Math.min(...allDates));
        let maxDate = new Date(Math.max(...allDates));

        minDate.setDate(1);
        maxDate.setMonth(maxDate.getMonth() + 1);
        maxDate.setDate(1);

        const totalDays = (maxDate - minDate) / (1000 * 60 * 60 * 24);

        const header = document.createElement('div');
        header.className = 'gantt-header-months';
        let temp = new Date(minDate);
        while (temp < maxDate) {
            const mCol = document.createElement('div');
            mCol.className = 'month-col';
            mCol.innerText = `${temp.getMonth() + 1}/${temp.getFullYear()}`;
            header.appendChild(mCol);
            temp.setMonth(temp.getMonth() + 1);
        }
        container.appendChild(header);

        const today = new Date();
        if (today >= minDate && today <= maxDate) {
            const left = ((today - minDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
            const line = document.createElement('div');
            line.className = 'today-line';
            line.style.left = `calc(280px + ${left}%)`;
            container.appendChild(line);
        }

        tasks.forEach(task => {
            const tStart = new Date(task.start + "T00:00:00");
            const tEnd = new Date(task.end + "T00:00:00");
            const left = ((tStart - minDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
            const width = ((tEnd - tStart) / (1000 * 60 * 60 * 24) / totalDays) * 100;

            const row = document.createElement('div');
            row.className = 'gantt-row';
            row.innerHTML = `
                <div class="task-label" title="${task.name}">${task.name || '(Sem nome)'}</div>
                <div class="timeline-area">
                    <div class="bar" style="left: ${left}%; width: ${width}%; background-color: ${task.color || '#4a90e2'}">
                        <span style="overflow:hidden; text-overflow:ellipsis;">${width > 12 ? task.cat : ''}</span>
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function updateTask(index, field, value) {
        tasks[index][field] = value;
        render();
    }

    function addTask() {
        const today = new Date().toISOString().split('T')[0];
        tasks.push({
            id: Date.now(),
            name: "",
            start: today,
            end: today,
            cat: "",
            color: "#4a90e2"
        });
        render();
    }

    function removeTask(index) {
        tasks.splice(index, 1);
        render();
    }

    function resetData() {
        if (confirm("Tem certeza que deseja limpar todos os dados do projeto?")) {
            tasks = [];
            document.getElementById('main-title').innerText = "";
            localStorage.clear();
            render();
        }
    }

    function exportToJSON() {
        const data = { title: document.getElementById('main-title').innerText, tasks: tasks };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "projeto-cronograma.json";
        a.click();
    }

    function importFromJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.tasks) {
                    tasks = imported.tasks;
                    document.getElementById('main-title').innerText = imported.title || "";
                    render();
                }
            } catch (err) { alert("Erro ao ler JSON."); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function exportToPNG() {
        const area = document.getElementById('gantt-capture-area');
        html2canvas(area, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'cronograma-gantt.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
