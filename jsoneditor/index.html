<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-edit"></i>
                <h1>JSON <span>Editor Pro</span></h1>
            </div>
            <div class="actions">
                <label for="upload-json" class="btn btn-primary">
                    <i class="fas fa-upload"></i> Upload
                </label>
                <input type="file" id="upload-json" accept=".json" hidden>
                
                <button id="export-json" class="btn btn-success">
                    <i class="fas fa-download"></i> Exportar
                </button>
            </div>
        </header>

        <main>
            <div class="table-controls">
                <div class="left-controls">
                    <h2>Registros</h2>
                    <div class="insertion-preference">
                        <span>Novos registros no:</span>
                        <select id="insert-pos">
                            <option value="top">Topo</option>
                            <option value="bottom">Fim</option>
                        </select>
                    </div>
                </div>
                <button id="add-record" class="btn btn-add">
                    <i class="fas fa-plus"></i> Novo Registro
                </button>
            </div>
            
            <div id="json-viewer" class="table-responsive">
                <p class="empty-msg">Faça upload de um arquivo para começar.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
