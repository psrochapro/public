<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Ultra Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-layer-group"></i> <span>JSON <b>Ultra</b></span></div>
            <nav id="sections-menu"></nav>
            <div class="sidebar-footer">
                <label for="upload-json" class="btn btn-upload"><i class="fas fa-cloud-upload-alt"></i> Abrir JSON</label>
                <input type="file" id="upload-json" accept=".json" hidden>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div class="header-left">
                    <h2 id="current-section-title">Bem-vindo</h2>
                    <div id="list-controls" class="list-controls" style="display:none">
                        <span>Novos no:</span>
                        <select id="insert-pos"><option value="top">Topo</option><option value="bottom">Fim</option></select>
                    </div>
                </div>
                <div class="header-right">
                    <button id="add-record" class="btn btn-add"><i class="fas fa-plus"></i> Novo Registro</button>
                    <button id="export-json" class="btn btn-save-all"><i class="fas fa-download"></i> Exportar JSON</button>
                </div>
            </header>

            <div id="content-area" class="content-area">
                <div class="welcome">
                    <i class="fas fa-database"></i>
                    <p>Carregue um arquivo JSON para começar a edição profissional.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
