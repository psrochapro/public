<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Blueprint Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bibliotecas via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>

    <div class="main-container">
        <h1 class="dashboard-title">SISTEMA DE MONITORAMENTO BLUEPRINT</h1>
        
        <div id="error-message" style="color: #ff4444; text-align: center; margin-bottom: 20px;"></div>

        <div class="grid-layout">
            <div class="chart-card"><canvas id="chartVendas"></canvas></div>
            <div class="chart-card"><canvas id="chartRosca"></canvas></div>
            <div class="chart-card"><canvas id="chartLinha"></canvas></div>
            <div class="chart-card"><canvas id="chartBarras"></canvas></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
