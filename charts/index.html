<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Dashboard Blueprint</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Bibliotecas via CDN alternativo (Cloudflare) para evitar o erro de conexão -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
    <div class="main-container">
        <header>
            <h1 class="dashboard-title">SISTEMA DE MONITORAMENTO BLUEPRINT</h1>
            <div class="status-bar">DADOS EM TEMPO REAL // ESTILO GLASS</div>
        </header>
        <div class="grid-layout">
            <div class="chart-card"><canvas id="chartVendas"></canvas></div>
            <div class="chart-card"><canvas id="chartRosca"></canvas></div>
            <div class="chart-card"><canvas id="chartLinha"></canvas></div>
            <div class="chart-card"><canvas id="chartBarras"></canvas></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
