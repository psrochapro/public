<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Levantamento de Processos</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/print.css">
    <link rel="stylesheet" href="css/presentation.css">
    <link rel="stylesheet" href="css/mobile.css" media="screen">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>

    <div id="editor-container" class="editor-collapsed no-print">
        <button id="editor-toggle" title="Alternar Editor">
            <span class="toggle-icon">❮</span>
        </button>
        <div class="editor-content">
            <div class="editor-header">
                <h3>Editor de Processo</h3>
                <span class="editor-status">Sync Ativo</span>
            </div>
            <div class="editor-wrapper">
                <div id="editor-highlight" aria-hidden="true"></div>
                <textarea id="editor-input" spellcheck="false" placeholder="Cole seu processo aqui..."></textarea>
            </div>
        </div>
    </div>

    <div class="toolbar-wrapper no-print">
        <div class="toolbar">
            <input type="file" id="fileInput" accept=".txt,.cnv" style="display: none;">
            
            <div class="btn-group">
                <button class="btn-import" onclick="document.getElementById('fileInput').click()">Importar</button>
                <button class="btn-export" onclick="persistence.exportCanvas()">Exportar</button>
            </div>

            <div class="btn-group">
                <button class="btn-template" onclick="template.downloadTemplate()">Template</button>
                <button class="btn-example" onclick="template.downloadExample()">Exemplo</button>
            </div>

            <div class="btn-group">
                <button class="btn-print" onclick="window.print()">PDF</button>
                <button class="btn-share" onclick="share.generateShareLink()">🔗 Link</button>
            </div>

            <div class="btn-group">
                <button class="btn-presentation" id="btn-presentation">Apresentação</button>
            </div>
        </div>
    </div>

    <div class="glass-container" id="canvasPrint">
        <div class="process-title-header">
            <h1 id="val-nome">Nome do Processo</h1>
        </div>

        <div class="header-dashboard">
            <div class="meta-side">
                <div class="meta-card-row">
                    <div class="meta-card-letter">A</div>
                    <div class="meta-card-label">Macroprocesso</div>
                    <div class="meta-card-value" id="val-macroprocesso">---</div>
                </div>
                <div class="meta-card-row">
                    <div class="meta-card-letter">B</div>
                    <div class="meta-card-label">Área</div>
                    <div class="meta-card-value" id="val-area">---</div>
                </div>
                <div class="meta-card-row">
                    <div class="meta-card-letter">C</div>
                    <div class="meta-card-label">Dono do Processo e Equipe</div>
                    <div class="meta-card-value" id="val-dono">---</div>
                </div>
                <div class="meta-card-row">
                    <div class="meta-card-letter">D</div>
                    <div class="meta-card-label">Objetivo Geral do Processo</div>
                    <div class="meta-card-value" id="val-objetivo">---</div>
                </div>
            </div>
            
            <div class="counter-side">
                <div class="activity-counter-card">
                    <span class="counter-number" id="val-total-atividades">0</span>
                    <span class="counter-label">Atividades</span>
                </div>
            </div>
        </div>

        <div class="survey-card-list" id="survey-container"></div>

        <div class="flow-section-header">DETALHAMENTO DO FLUXO</div>
        
        <div class="flow-container">
            <table class="flow-table-styled">
                <thead>
                    <tr class="flow-header-row">
                        <th style="width: 45px;">📋 <span class="hide-print">Etapa</span><span class="show-print">E</span></th>
                        <th style="width: 12%;">👥 Fornecedor</th>
                        <th style="width: 12%;">📥 Insumos</th>
                        <th style="width: 12%;">👤 Ator</th>
                        <th>✅ Atividades</th>
                        <th style="width: 13%;">📦 Saídas</th>
                        <th style="width: 12%;">👥 Cliente</th>
                    </tr>
                </thead>
                <tbody id="flow-items-container"></tbody>
            </table>
        </div>

        <div id="obs-section-container"></div>
    </div>

    <div id="presentation-controls" class="no-print">
        <button id="pres-prev">⬅ Anterior</button>
        <span id="pres-info">Modo Apresentação</span>
        <button id="pres-next">Próximo ➡</button>
        <button id="pres-exit">Sair</button>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/template.js"></script>
    <script src="js/share.js"></script>
    <script src="js/presentation.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
