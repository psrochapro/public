<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Studio Pro | Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <input type="text" id="collection-name" class="title-input" placeholder="Nome da Coleção...">
                <div class="main-actions">
                    <button id="btn-export" class="btn-primary">Exportar .card</button>
                    <label for="import-file" class="btn-outline">Importar</label>
                    <input type="file" id="import-file" accept=".card" hidden>
                </div>
            </header>

            <nav class="sidebar-tabs">
                <button class="tab-btn active" data-tab="tab-cards">Cards</button>
                <button class="tab-btn" data-tab="tab-categories">Categorias</button>
                <button class="tab-btn" data-tab="tab-config">Ajustes</button>
            </nav>

            <div class="tab-content">
                <!-- ABA DE CARDS -->
                <section id="tab-cards" class="tab-pane active">
                    <div class="form-sticky">
                        <form id="form-card" class="admin-form">
                            <h3 id="card-form-title">Novo Card</h3>
                            <input type="hidden" id="edit-card-id">
                            <input type="text" id="card-item" placeholder="Título do Item" required>
                            <textarea id="card-desc" placeholder="Descrição detalhada..." required></textarea>
                            <select id="card-cat" required>
                                <option value="">Selecione uma categoria</option>
                            </select>
                            <div class="file-group">
                                <label>Imagem do Card</label>
                                <input type="file" id="card-img" accept="image/*">
                            </div>
                            <div class="form-buttons">
                                <button type="submit" id="btn-save-card" class="btn-success">Salvar Card</button>
                                <button type="button" id="btn-cancel-card" class="btn-ghost hidden">Cancelar</button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="manage-list-container">
                        <h4>Gerenciar Cards</h4>
                        <div id="manage-cards-list" class="manage-list"></div>
                    </div>
                </section>

                <!-- ABA DE CATEGORIAS -->
                <section id="tab-categories" class="tab-pane">
                    <div class="form-sticky">
                        <form id="form-category" class="admin-form">
                            <h3 id="cat-form-title">Nova Categoria</h3>
                            <input type="hidden" id="edit-cat-id">
                            <input type="text" id="cat-name" placeholder="Nome da Categoria" required>
                            <div class="color-grid">
                                <div class="color-field">
                                    <label>Fita/Barra</label>
                                    <input type="color" id="cat-bg" value="#00b4db">
                                </div>
                                <div class="color-field">
                                    <label>Texto Fita</label>
                                    <input type="color" id="cat-text" value="#ffffff">
                                </div>
                                <div class="color-field">
                                    <label>Fundo Card</label>
                                    <input type="color" id="cat-card-bg" value="#ffffff">
                                </div>
                            </div>
                            <div class="form-buttons">
                                <button type="submit" id="btn-save-cat" class="btn-success">Salvar Categoria</button>
                                <button type="button" id="btn-cancel-cat" class="btn-ghost hidden">Cancelar</button>
                            </div>
                        </form>
                    </div>

                    <div class="manage-list-container">
                        <h4>Categorias Existentes</h4>
                        <div id="manage-cats-list" class="manage-list"></div>
                    </div>
                </section>

                <!-- ABA DE AJUSTES GLOBAIS -->
                <section id="tab-config" class="tab-pane">
                    <div class="admin-form">
                        <h3>Dimensões Globais (px)</h3>
                        <div class="config-grid">
                            <div class="config-field">
                                <label>Largura Card</label>
                                <input type="number" id="global-width" value="300" min="200" max="600">
                            </div>
                            <div class="config-field">
                                <label>Altura Card</label>
                                <input type="number" id="global-height" value="420" min="300" max="800">
                            </div>
                            <div class="config-field">
                                <label>Tamanho Ícone</label>
                                <input type="number" id="global-img-size" value="160" min="50" max="400">
                            </div>
                        </div>
                    </div>

                    <div class="danger-zone">
                        <p>Zona Crítica</p>
                        <button id="btn-clear" class="btn-danger-minimal">Limpar Todo o Projeto</button>
                    </div>
                </section>
            </div>
        </aside>

        <!-- VIEWPORT -->
        <main class="viewport">
            <div class="viewport-header">
                <h1 id="view-title">Visualização da Coleção</h1>
            </div>
            <div id="card-container" class="grid-container">
                <!-- Cards renderizados via JS -->
            </div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
