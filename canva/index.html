<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessFlow Pro | Compact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-layout.css">
    <link rel="stylesheet" href="css/modern-style.css">
</head>
<body>
    <div class="background-mesh"></div>

    <nav class="glass-toolbar no-print">
        <div class="logo">Process<span>Flow</span></div>
        <div class="nav-actions">
            <input type="file" id="fileInput" accept=".txt,.cnv" style="display: none;">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Importar</button>
            <button class="btn btn-secondary" onclick="template.downloadTemplate()">Template</button>
            <button class="btn btn-secondary" onclick="template.downloadExample()">Exemplo</button>
            <button class="btn btn-accent" onclick="persistence.exportCanvas()">Exportar .CNV</button>
            <button class="btn btn-dark" onclick="window.print()">PDF</button>
        </div>
    </nav>

    <main class="main-content" id="canvasPrint">
        <!-- Dashboard Header Slim -->
        <header class="dashboard-header glass">
            <div class="header-top">
                <h1 id="val-nome">Título do Processo</h1>
                <div class="header-meta">
                    <div class="meta-chip"><span>Macro</span><strong id="val-macroprocesso">---</strong></div>
                    <div class="meta-chip"><span>Área</span><strong id="val-area">---</strong></div>
                    <div class="meta-chip"><span>Dono</span><strong id="val-dono">---</strong></div>
                </div>
            </div>
            <div class="objective-bar" id="val-objetivo">Objetivo do processo será exibido aqui em uma linha elegante.</div>
        </header>

        <!-- Seção 1: Levantamento Compacto -->
        <section class="section-container">
            <div class="section-header">
                <span class="dot"></span>
                <h2>Levantamento Estruturado</h2>
            </div>
            <div class="inventory-grid" id="inventory-container">
                <!-- Cards compactos via JS -->
            </div>
        </section>

        <!-- Seção 2: Fluxo de Tabela Glass -->
        <section class="section-container">
            <div class="section-header">
                <span class="dot"></span>
                <h2>Fluxo de Atividades</h2>
            </div>
            <div class="flow-glass-table">
                <div class="flow-thead">
                    <div class="th-etapa">#</div>
                    <div class="th-inputs">Fornecedor / Insumos</div>
                    <div class="th-actor">Ator</div>
                    <div class="th-activity">Atividades Detalhadas</div>
                    <div class="th-outputs">Saídas / Cliente</div>
                </div>
                <div id="flow-container">
                    <!-- Linhas horizontais via JS -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/template.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
