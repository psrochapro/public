<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessFlow Pro | Crystal Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-layout.css">
    <link rel="stylesheet" href="css/modern-style.css">
</head>
<body>
    <div class="background-mesh"></div>

    <nav class="glass-toolbar no-print">
        <div class="logo">Process<span>Flow</span></div>
        <div class="nav-actions">
            <input type="file" id="fileInput" accept=".txt,.cnv" style="display: none;">
            <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">Importar</button>
            <button class="btn btn-template" onclick="template.downloadTemplate()">Template</button>
            <button class="btn btn-example" onclick="template.downloadExample()">Exemplo</button>
            <button class="btn btn-export" onclick="persistence.exportCanvas()">Exportar .CNV</button>
            <button class="btn btn-print" onclick="window.print()">Imprimir PDF</button>
        </div>
    </nav>

    <main class="main-content" id="canvasPrint">
        <!-- Dashboard Header Slim Premium -->
        <header class="dashboard-header glass">
            <div class="header-top">
                <h1 id="val-nome">Título do Processo</h1>
                <div class="header-meta">
                    <div class="meta-chip"><span>Macro</span><strong id="val-macroprocesso">---</strong></div>
                    <div class="meta-chip"><span>Área</span><strong id="val-area">---</strong></div>
                    <div class="meta-chip"><span>Dono</span><strong id="val-dono">---</strong></div>
                </div>
            </div>
            <div class="objective-bar" id="val-objetivo">Objetivo do processo será exibido aqui em uma linha elegante.</div>
        </header>

        <!-- Seção 1: Inventário Compacto -->
        <section class="section-container">
            <div class="section-header">
                <span class="dot"></span>
                <h2>Levantamento Estruturado</h2>
            </div>
            <div class="inventory-grid" id="inventory-container"></div>
        </section>

        <!-- Seção 2: Tabela de Atividades Crystal -->
        <section class="section-container">
            <div class="section-header">
                <span class="dot"></span>
                <h2>Fluxo de Atividades</h2>
            </div>
            <div class="glass-table-container glass">
                <div class="glass-table-header">
                    <div class="cell-etapa">#</div>
                    <div class="cell-col">Fornecedor</div>
                    <div class="cell-col">Insumos</div>
                    <div class="cell-col">Ator</div>
                    <div class="cell-desc">Atividades Detalhadas</div>
                    <div class="cell-col">Saídas</div>
                    <div class="cell-col">Cliente</div>
                </div>
                <div id="flow-container" class="glass-table-body">
                    <!-- Linhas horizontais via JS -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/template.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
