<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Levantamento de Processos</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="toolbar no-print">
        <input type="file" id="fileInput" accept=".txt,.cnv" style="display: none;">
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">Importar Arquivo</button>
        <button class="btn-export" onclick="persistence.exportCanvas()">Exportar .CNV</button>
        <button class="btn-print" onclick="window.print()">Imprimir PDF</button>
    </div>

    <div class="main-container" id="canvasPrint">
        <!-- Cabeçalho Superior Fluido -->
        <header class="sheet-header">
            <div class="process-name-bar" id="val-nome">Nome do Processo</div>
            
            <div class="header-grid">
                <table class="meta-table">
                    <tr>
                        <td class="label-cell">A</td>
                        <td class="title-cell">Macroprocesso</td>
                        <td class="content-cell" id="val-macroprocesso">---</td>
                    </tr>
                    <tr>
                        <td class="label-cell">B</td>
                        <td class="title-cell">Área</td>
                        <td class="content-cell" id="val-area">---</td>
                    </tr>
                    <tr>
                        <td class="label-cell">C</td>
                        <td class="title-cell">Dono do Processo e Equipe</td>
                        <td class="content-cell" id="val-dono">---</td>
                    </tr>
                </table>
                <div class="objective-box">
                    <div class="objective-title">Objetivo geral do processo</div>
                    <div class="objective-content" id="val-objetivo">---</div>
                </div>
            </div>
        </header>

        <!-- Tabela de Itens Fluida -->
        <table class="fluid-table">
            <thead>
                <tr>
                    <th style="width: 40px;">N.º</th>
                    <th style="width: 60px;">Ícone</th>
                    <th style="width: 180px;">Item</th>
                    <th>Descrição</th>
                    <th style="width: 45%;">Respostas</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- As linhas serão geradas dinamicamente via JS -->
            </tbody>
        </table>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
