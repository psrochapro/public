<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Levantamento de Processos</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>

    <div class="toolbar no-print">
        <input type="file" id="fileInput" accept=".txt,.cnv" style="display: none;">
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">Importar Arquivo</button>
        <button class="btn-template" onclick="template.downloadTemplate()">Gerar Template</button>
        <button class="btn-example" onclick="template.downloadExample()">Gerar Exemplo</button>
        <button class="btn-export" onclick="persistence.exportCanvas()">Exportar .CNV</button>
        <button class="btn-print" onclick="window.print()">Imprimir PDF</button>
    </div>

    <div class="glass-container" id="canvasPrint">
        <!-- Título Isolado -->
        <div class="process-title-header">
            <h1 id="val-nome">Nome do Processo</h1>
        </div>

        <!-- Cabeçalho Linear A, B, C, D -->
        <header class="meta-linear-grid">
            <div class="meta-linear-row">
                <div class="meta-letter-box">A</div>
                <div class="meta-label-box">Macroprocesso</div>
                <div class="meta-value-box" id="val-macroprocesso">---</div>
            </div>
            <div class="meta-linear-row">
                <div class="meta-letter-box">B</div>
                <div class="meta-label-box">Área</div>
                <div class="meta-value-box" id="val-area">---</div>
            </div>
            <div class="meta-linear-row">
                <div class="meta-letter-box">C</div>
                <div class="meta-label-box">Dono do Processo e Equipe</div>
                <div class="meta-value-box" id="val-dono">---</div>
            </div>
            <div class="meta-linear-row">
                <div class="meta-letter-box">D</div>
                <div class="meta-label-box">Objetivo Geral do Processo</div>
                <div class="meta-value-box" id="val-objetivo">---</div>
            </div>
        </header>

        <!-- Levantamento em Cards -->
        <div class="survey-card-list" id="survey-container"></div>

        <!-- Tabela de Fluxo -->
        <div class="flow-section-header">DETALHAMENTO DO FLUXO</div>
        <table class="flow-table flow-table-refined">
            <thead>
                <tr class="icon-row">
                    <th><img src="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" alt="Etapa"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Fornecedor"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/2897/2897785.png" alt="Insumos"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/6009/6009030.png" alt="Ator"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" alt="Atividades"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/2897/2897785.png" alt="Saídas"></th>
                    <th><img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="Cliente"></th>
                </tr>
                <tr class="title-row">
                    <th style="width: 80px;">Etapa</th>
                    <th>Fornecedor</th>
                    <th>Insumos</th>
                    <th>Ator (Executor)</th>
                    <th>Atividades</th>
                    <th>Saídas</th>
                    <th>Cliente</th>
                </tr>
            </thead>
            <tbody id="flow-body"></tbody>
        </table>
    </div>

    <script src="js/parser.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/template.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
