<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Citações Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Citação<span>Pro</span></h1>
            
            <section class="control-group">
                <h3>1. Conteúdo</h3>
                <input type="text" id="input-title" placeholder="Título (ex: Macroprocessos)">
                <textarea id="input-quote" placeholder="Sua citação aqui...">Um macroprocesso é um conjunto de atividades complexas que atravessam diferentes departamentos (visão ponta a ponta).</textarea>
                <div class="row">
                    <input type="text" id="input-author" placeholder="Autor" value="João da Silva">
                    <input type="text" id="input-year" placeholder="Ano" value="2026">
                </div>
                <input type="text" id="input-watermark" placeholder="Sua marca (ex: @seu-perfil)">
            </section>

            <section class="control-group">
                <h3>2. Imagem & Moldura</h3>
                <div class="image-input-wrapper">
                    <input type="file" id="input-file" accept="image/*">
                    <input type="text" id="input-url" placeholder="URL da imagem">
                    <button id="btn-remove-img" class="btn-secondary">Remover Foto</button>
                </div>
                
                <div class="row">
                    <div>
                        <label>Posição</label>
                        <select id="input-img-pos">
                            <option value="top">Topo</option>
                            <option value="left">Esquerda</option>
                        </select>
                    </div>
                    <div>
                        <label>Formato</label>
                        <select id="input-img-shape">
                            <option value="circle">Círculo</option>
                            <option value="square">Quadrado</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>Tamanho (%)</label>
                        <input type="range" id="input-img-size" min="10" max="50" value="30">
                    </div>
                    <div>
                        <label>Borda (px)</label>
                        <input type="range" id="input-img-border-weight" min="0" max="20" value="4">
                    </div>
                </div>

                <label>Ajuste de Foco (Vertical)</label>
                <input type="range" id="input-img-focus" min="0" max="100" value="50">
                
                <label>Filtro da Foto</label>
                <select id="input-filter">
                    <option value="none">Sem Filtro</option>
                    <option value="grayscale(100%)">Preto e Branco</option>
                    <option value="sepia(80%)">Sépia</option>
                </select>
            </section>

            <section class="control-group">
                <h3>3. Estilo Visual</h3>
                <div class="row">
                    <div>
                        <label>Cor Base</label>
                        <input type="color" id="input-color" value="#3b82f6">
                    </div>
                    <div>
                        <label>Fundo</label>
                        <select id="input-bg-style">
                            <option value="solid">Sólido</option>
                            <option value="gradient">Gradiente Suave</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>Padrão de Arte</label>
                        <select id="input-pattern-type">
                            <option value="circles">Círculos</option>
                            <option value="grid">Grade Digital</option>
                            <option value="diagonals">Linhas Diagonais</option>
                            <option value="bubbles">Bolhas Aleatórias</option>
                        </select>
                    </div>
                    <div>
                        <label>Fonte</label>
                        <select id="input-font">
                            <option value="Montserrat">Sans (Montserrat)</option>
                            <option value="Playfair Display">Serif (Playfair)</option>
                            <option value="Dancing Script">Script (Dancing)</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>Opacidade Arte</label>
                        <input type="range" id="input-bg-opacity" min="0" max="100" value="20">
                    </div>
                    <div>
                        <label>Borda Card</label>
                        <input type="range" id="input-border-opacity" min="0" max="100" value="30">
                    </div>
                </div>
                <label>Proporção do Layout</label>
                <select id="input-layout">
                    <option value="1:1">Quadrado (1:1)</option>
                    <option value="16:9">Wide (16:9)</option>
                    <option value="9:16">Stories (9:16)</option>
                </select>
            </section>

            <button id="btn-download" class="btn-primary">Baixar PNG de Alta Resolução</button>
        </aside>

        <main class="preview-area">
            <div id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
