<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Citações Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Citação<span>Pro</span></h1>
            
            <section class="control-group">
                <h3>Conteúdo</h3>
                <input type="text" id="input-title" placeholder="Título (Opcional)">
                <textarea id="input-quote" placeholder="Sua citação aqui..."></textarea>
                <input type="text" id="input-author" placeholder="Autor">
                <input type="text" id="input-year" placeholder="Ano (Opcional)">
            </section>

            <section class="control-group">
                <h3>Imagem</h3>
                <input type="file" id="input-file" accept="image/*">
                <input type="text" id="input-url" placeholder="Ou cole a URL da imagem">
                <div class="range-group">
                    <label>Foco da Imagem (Vertical)</label>
                    <input type="range" id="input-focus" min="0" max="100" value="50">
                </div>
                <div class="filters">
                    <select id="input-filter">
                        <option value="none">Sem Filtro</option>
                        <option value="grayscale(100%)">Preto e Branco</option>
                        <option value="sepia(80%)">Sépia</option>
                        <option value="blur(5px)">Desfoque</option>
                    </select>
                </div>
            </section>

            <section class="control-group">
                <h3>Estilo & Layout</h3>
                <div class="row">
                    <div>
                        <label>Tema</label>
                        <input type="color" id="input-color" value="#6366f1">
                    </div>
                    <div>
                        <label>Layout</label>
                        <select id="input-layout">
                            <option value="1:1">Quadrado (1:1)</option>
                            <option value="16:9">Wide (16:9)</option>
                            <option value="9:16">Stories (9:16)</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>Fonte</label>
                        <select id="input-font">
                            <option value="Montserrat">Sans Serif</option>
                            <option value="Playfair Display">Serif</option>
                            <option value="Dancing Script">Script</option>
                        </select>
                    </div>
                    <div>
                        <label>Padding</label>
                        <input type="range" id="input-padding" min="20" max="100" value="60">
                    </div>
                </div>
            </section>

            <button id="btn-download" class="btn-primary">Baixar PNG</button>
        </aside>

        <main class="preview-area">
            <div id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
