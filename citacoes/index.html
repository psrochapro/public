<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Citações Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Citação<span>Pro</span></h1>
            
            <section class="control-group">
                <h3>1. Conteúdo</h3>
                <input type="text" id="input-title" placeholder="Título (ex: Macroprocessos)">
                <textarea id="input-quote" placeholder="Sua citação aqui...">Um macroprocesso é um conjunto de atividades complexas que atravessam diferentes departamentos (visão ponta a ponta).</textarea>
                <input type="text" id="input-author" placeholder="Autor" value="João da Silva">
                <input type="text" id="input-year" placeholder="Ano (Opcional)" value="2026">
            </section>

            <section class="control-group">
                <h3>2. Imagem do Autor</h3>
                <input type="file" id="input-file" accept="image/*">
                <input type="text" id="input-url" placeholder="Ou cole a URL da imagem">
                
                <div class="row">
                    <div>
                        <label>Posição</label>
                        <select id="input-img-pos">
                            <option value="top">Topo</option>
                            <option value="left">Esquerda</option>
                        </select>
                    </div>
                    <div>
                        <label>Formato</label>
                        <select id="input-img-shape">
                            <option value="square">Quadrado</option>
                            <option value="circle">Círculo</option>
                        </select>
                    </div>
                </div>

                <div class="range-group">
                    <label>Tamanho da Imagem (%)</label>
                    <input type="range" id="input-img-size" min="10" max="50" value="25">
                </div>

                <div class="filters">
                    <label>Filtro da Foto</label>
                    <select id="input-filter">
                        <option value="none">Sem Filtro</option>
                        <option value="grayscale(100%)">Preto e Branco</option>
                        <option value="sepia(80%)">Sépia</option>
                    </select>
                </div>
            </section>

            <section class="control-group">
                <h3>3. Estilo & Layout</h3>
                <div class="row">
                    <div>
                        <label>Cor de Fundo</label>
                        <input type="color" id="input-color" value="#0a192f">
                    </div>
                    <div>
                        <label>Proporção</label>
                        <select id="input-layout">
                            <option value="1:1">Quadrado (1:1)</option>
                            <option value="16:9">Wide (16:9)</option>
                            <option value="9:16">Stories (9:16)</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>Fonte</label>
                        <select id="input-font">
                            <option value="Montserrat">Sans Serif (Montserrat)</option>
                            <option value="Playfair Display">Serif (Playfair)</option>
                            <option value="Dancing Script">Script (Dancing)</option>
                        </select>
                    </div>
                    <div>
                        <label>Padding</label>
                        <input type="range" id="input-padding" min="40" max="150" value="80">
                    </div>
                </div>
            </section>

            <button id="btn-download" class="btn-primary">Baixar Imagem PNG</button>
        </aside>

        <main class="preview-area">
            <div id="canvas-wrapper">
                <canvas id="main-canvas"></canvas>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
