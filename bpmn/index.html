<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador BPMN Camunda 8</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .task-row { display: flex; gap: 10px; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; align-items: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .task-name { flex: 2; }
        .lane-name { flex: 1; background-color: #fffbe6; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; margin-bottom: 20px; }
        .btn-generate { background-color: #007bff; color: white; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn-remove { background-color: #ff4d4f; color: white; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        small { color: #666; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Gerador de Fluxo para Camunda 8</h2>
        <small>Preencha as tarefas e quem as executa (Raia) para gerar o BPMN compatível.</small>
    </div>
    
    <label>Nome do Processo:</label>
    <input type="text" id="processName" placeholder="Ex: Processo de Inscrição" style="width: 97%; margin-bottom: 20px;">

    <div id="tasksContainer">
        <label>Fluxo de Atividades:</label>
        <!-- A primeira tarefa já vem por padrão -->
        <div class="task-row">
            <input type="text" class="task-input" placeholder="Nome da tarefa (Ex: Validar Documentos)">
            <input type="text" class="lane-input" placeholder="Raia/Papel (Ex: Financeiro)">
            <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
        </div>
    </div>

    <button class="btn-add" onclick="addTask()">+ Adicionar Próxima Etapa</button>
    <button class="btn-generate" onclick="generateBPMN()">Gerar e Baixar arquivo .bpmn</button>
</div>

<script>
    function addTask() {
        const container = document.getElementById('tasksContainer');
        const div = document.createElement('div');
        div.className = 'task-row';
        div.innerHTML = `
            <input type="text" class="task-input" placeholder="Nome da tarefa">
            <input type="text" class="lane-input" placeholder="Raia/Papel">
            <button class="btn-remove" onclick="this.parentElement.remove()">X</button>
        `;
        container.appendChild(div);
    }

    function generateBPMN() {
        const pName = document.getElementById('processName').value || "Processo_Automatico";
        const pId = "Process_" + Math.random().toString(36).substr(2, 9);
        const collId = "Collaboration_1";
        const partId = "Participant_1";
        
        const taskInputs = document.querySelectorAll('.task-input');
        const laneInputs = document.querySelectorAll('.lane-input');
        
        let steps = [];
        taskInputs.forEach((input, i) => {
            if(input.value.trim() !== "") {
                steps.push({ 
                    name: input.value, 
                    lane: laneInputs[i].value || "Geral" 
                });
            }
        });

        if (steps.length === 0) return alert("Adicione tarefas!");

        // Organizar por Lanes
        const lanesMap = {};
        steps.forEach((step, index) => {
            if (!lanesMap[step.lane]) lanesMap[step.lane] = [];
            lanesMap[step.lane].push(`Activity_${index}`);
        });

        const laneKeys = Object.keys(lanesMap);
        let laneXml = "";
        let currentLaneY = 80;
        const laneHeight = 200;

        laneKeys.forEach((laneName, i) => {
            const laneId = `Lane_${i}`;
            laneXml += `<bpmn:lane id="${laneId}" name="${laneName}">`;
            // Adiciona referências dos elementos que estão nessa lane
            if (i === 0) laneXml += `<bpmn:flowNodeRef>StartEvent_1</bpmn:flowNodeRef>`;
            lanesMap[laneName].forEach(id => { laneXml += `<bpmn:flowNodeRef>${id}</bpmn:flowNodeRef>`; });
            if (i === laneKeys.length - 1) laneXml += `<bpmn:flowNodeRef>EndEvent_1</bpmn:flowNodeRef>`;
            laneXml += `</bpmn:lane>`;
        });

        // Gerar Elementos e Conexões (Lógica Linear)
        let elementsXml = `<bpmn:startEvent id="StartEvent_1" name="Início"><bpmn:outgoing>Flow_start</bpmn:outgoing></bpmn:startEvent>`;
        let diXml = `
            <bpmndi:BPMNShape id="Participant_1_di" bpmnElement="${partId}" isHorizontal="true">
                <dc:Bounds x="160" y="80" width="${steps.length * 250 + 300}" height="${laneKeys.length * laneHeight}" />
            </bpmndi:BPMNShape>
            <bpmndi:BPMNShape id="StartEvent_1_di" bpmnElement="StartEvent_1">
                <dc:Bounds x="210" y="${150}" width="36" height="36" />
            </bpmndi:BPMNShape>`;

        laneKeys.forEach((laneName, i) => {
            diXml += `<bpmndi:BPMNShape id="Lane_${i}_di" bpmnElement="Lane_${i}" isHorizontal="true">
                <dc:Bounds x="190" y="${80 + (i * laneHeight)}" width="${steps.length * 250 + 270}" height="${laneHeight}" />
            </bpmndi:BPMNShape>`;
        });

        let lastId = "StartEvent_1";
        let lastFlowId = "Flow_start";
        let currentX = 300;

        steps.forEach((step, i) => {
            const taskId = `Activity_${i}`;
            const flowId = `Flow_Step_${i}`;
            const laneIdx = laneKeys.indexOf(step.lane);
            const targetY = 130 + (laneIdx * laneHeight);

            elementsXml += `
                <bpmn:sequenceFlow id="${lastFlowId}" sourceRef="${lastId}" targetRef="${taskId}" />
                <bpmn:task id="${taskId}" name="${step.name}">
                    <bpmn:incoming>${lastFlowId}</bpmn:incoming>
                    <bpmn:outgoing>${flowId}</bpmn:outgoing>
                </bpmn:task>`;

            diXml += `
                <bpmndi:BPMNShape id="${taskId}_di" bpmnElement="${taskId}">
                    <dc:Bounds x="${currentX}" y="${targetY}" width="100" height="80" />
                </bpmndi:BPMNShape>
                <bpmndi:BPMNEdge id="${lastFlowId}_di" bpmnElement="${lastFlowId}">
                    <di:waypoint x="${lastId === 'StartEvent_1' ? 246 : currentX - 150}" y="${lastId === 'StartEvent_1' ? 168 : 170}" />
                    <di:waypoint x="${currentX}" y="${targetY + 40}" />
                </bpmndi:BPMNEdge>`;

            lastId = taskId;
            lastFlowId = flowId;
            currentX += 200;
        });

        elementsXml += `
            <bpmn:sequenceFlow id="${lastFlowId}" sourceRef="${lastId}" targetRef="EndEvent_1" />
            <bpmn:endEvent id="EndEvent_1" name="Fim"><bpmn:incoming>${lastFlowId}</bpmn:incoming></bpmn:endEvent>`;

        diXml += `
            <bpmndi:BPMNShape id="EndEvent_1_di" bpmnElement="EndEvent_1">
                <dc:Bounds x="${currentX}" y="152" width="36" height="36" />
            </bpmndi:BPMNShape>
            <bpmndi:BPMNEdge id="${lastFlowId}_di" bpmnElement="${lastFlowId}">
                <di:waypoint x="${currentX - 100}" y="170" />
                <di:waypoint x="${currentX}" y="170" />
            </bpmndi:BPMNEdge>`;

        const fullXml = `<?xml version="1.0" encoding="UTF-8"?>
<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" xmlns:modeler="http://camunda.org/schema/modeler/1.0" id="Definitions_1" targetNamespace="http://bpmn.io/schema/bpmn" exporter="Camunda Web Modeler" modeler:executionPlatform="Camunda Cloud" modeler:executionPlatformVersion="8.3.0">
  <bpmn:collaboration id="${collId}">
    <bpmn:participant id="${partId}" name="${pName}" processRef="${pId}" />
  </bpmn:collaboration>
  <bpmn:process id="${pId}" name="${pName}" isExecutable="true">
    <bpmn:laneSet id="LaneSet_1">${laneXml}</bpmn:laneSet>
    ${elementsXml}
  </bpmn:process>
  <bpmndi:BPMNDiagram id="BPMNDiagram_1">
    <bpmndi:BPMNPlane id="BPMNPlane_1" bpmnElement="${collId}">
      ${diXml}
    </bpmndi:BPMNPlane>
  </bpmndi:BPMNDiagram>
</bpmn:definitions>`;

        const blob = new Blob([fullXml], { type: 'text/xml' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = pName.replace(/\s+/g, '_') + ".bpmn";
        a.click();
    }
</script>
</body>
</html>
