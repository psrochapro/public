<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Studio Pro | Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <input type="text" id="collection-name" class="title-input" placeholder="Nome da Coleção...">
                <div class="main-actions">
                    <button id="btn-export" class="btn-primary">Exportar .card</button>
                    <label for="import-file" class="btn-outline">Importar</label>
                    <input type="file" id="import-file" accept=".card" hidden>
                </div>
                <div class="text-actions">
                    <button id="btn-export-text" class="btn-text-only">Exportar Texto</button>
                    <label for="import-text" class="btn-text-only-outline">Importar Texto</label>
                    <input type="file" id="import-text" accept=".json" hidden>
                </div>
            </header>

            <nav class="sidebar-tabs">
                <button class="tab-btn active" data-tab="tab-cards">Cards</button>
                <button class="tab-btn" data-tab="tab-categories">Categorias</button>
                <button class="tab-btn" data-tab="tab-config">Ajustes</button>
            </nav>

            <div class="tab-content">
                <section id="tab-cards" class="tab-pane active">
                    <form id="form-card" class="admin-form">
                        <h3 id="card-form-title">Novo / Editar Card</h3>
                        <input type="hidden" id="edit-card-id">
                        <input type="text" id="card-item" placeholder="Título do Item" required>
                        <textarea id="card-desc" placeholder="Descrição detalhada..."></textarea>
                        <div class="form-row">
                            <select id="card-cat" required><option value="">Categoria...</option></select>
                            <select id="card-layout">
                                <option value="icon">Modo Ícone</option>
                                <option value="photo">Modo Foto</option>
                            </select>
                        </div>
                        <div class="file-group">
                            <label>Imagem</label>
                            <input type="file" id="card-img" accept="image/*">
                        </div>
                        <div class="form-buttons">
                            <button type="submit" id="btn-save-card" class="btn-success">Salvar Card</button>
                            <button type="button" id="btn-cancel-card" class="btn-ghost hidden">Cancelar</button>
                        </div>
                    </form>
                    <div class="manage-list-container">
                        <div class="manage-header-row">
                            <h4>Meus Cards</h4>
                            <input type="text" id="manage-cards-search" class="small-search" placeholder="Filtrar por nome...">
                        </div>
                        <div id="manage-cards-list" class="manage-list"></div>
                    </div>
                </section>

                <section id="tab-categories" class="tab-pane">
                    <form id="form-category" class="admin-form">
                        <h3 id="cat-form-title">Nova / Editar Categoria</h3>
                        <input type="hidden" id="edit-cat-id">
                        <input type="text" id="cat-name" placeholder="Nome da Categoria" required>
                        <div class="color-grid">
                            <div class="color-field"><label>Fita</label><input type="color" id="cat-bg"></div>
                            <div class="color-field"><label>Texto</label><input type="color" id="cat-text"></div>
                            <div class="color-field"><label>Fundo</label><input type="color" id="cat-card-bg"></div>
                        </div>
                        <div class="form-buttons">
                            <button type="submit" id="btn-save-cat" class="btn-success">Salvar Categoria</button>
                            <button type="button" id="btn-cancel-cat" class="btn-ghost hidden">Cancelar</button>
                        </div>
                    </form>
                    <div class="manage-list-container">
                        <h4>Lista de Categorias</h4>
                        <div id="manage-cats-list" class="manage-list"></div>
                    </div>
                </section>

                <section id="tab-config" class="tab-pane">
                    <div class="config-section">
                        <div class="section-title">1. Geometria (px)</div>
                        <div class="config-grid-inputs">
                            <div class="input-group-num"><label>Largura</label><input type="number" id="global-width"></div>
                            <div class="input-group-num"><label>Altura</label><input type="number" id="global-height"></div>
                            <div class="input-group-num"><label>Bordas</label><input type="number" id="global-radius"></div>
                        </div>
                    </div>
                    <div class="config-section">
                        <div class="section-title">2. Elementos (px)</div>
                        <div class="config-grid-inputs">
                            <div class="input-group-num"><label>Tam. Ícone</label><input type="number" id="global-img-size"></div>
                        </div>
                    </div>
                    <div class="config-section">
                        <div class="section-title">3. Tipografia (px)</div>
                        <div class="config-grid-inputs">
                            <div class="input-group-num"><label>Título</label><input type="number" id="f-size-item"></div>
                            <div class="input-group-num"><label>Descrição</label><input type="number" id="f-size-desc"></div>
                            <div class="input-group-num"><label>Categoria</label><input type="number" id="f-size-cat"></div>
                        </div>
                    </div>
                    <div class="danger-zone">
                        <button id="btn-clear" class="btn-danger-minimal">Limpar Todo o Projeto</button>
                    </div>
                </section>
            </div>
        </aside>

        <main class="viewport">
            <header class="viewport-header">
                <h1 id="view-title">Visualização</h1>
                <div class="toolbar">
                    <div class="search-box"><input type="text" id="search-input" placeholder="Pesquisar nos cards..."></div>
                    <div class="filter-box"><select id="filter-category"><option value="all">Todas Categorias</option></select></div>
                </div>
            </header>
            <div id="card-container" class="grid-container"></div>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
