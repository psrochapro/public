<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>News Snapshot Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="ratio-16-9"> <!-- Classe dinâmica: ratio-1-1, ratio-16-9, ratio-9-16 -->

    <aside class="sidebar-editor">
        <h2>Snapshot Editor</h2>
        
        <div class="control-group">
            <label>Formato de Saída</label>
            <select id="layout-selector">
                <option value="ratio-16-9">Wide (16:9)</option>
                <option value="ratio-1-1">Quadrado (1:1)</option>
                <option value="ratio-9-16">Stories (9:16)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Cor de Destaque</label>
            <input type="color" id="accent-color" value="#cc0000">
        </div>

        <button id="btn-toggle-ui">Ver Apenas Arte</button>
        <button id="btn-export" class="btn-primary">Baixar PNG</button>
    </aside>

    <main class="preview-container">
        <!-- O STAGE é o que vira foto. Tudo dentro dele deve ser conciso -->
        <div id="snapshot-stage">
            
            <header class="card-header">
                <img src="" id="logo-img" class="logo">
                <div class="live-badge"><span>●</span> LIVE</div>
            </header>

            <div class="card-body">
                <div class="main-image-area">
                    <img src="" id="main-img">
                    <div class="image-footer" id="image-date"></div>
                </div>

                <div class="content-area">
                    <span class="category-badge" id="category"></span>
                    <h1 id="title"></h1>
                    <p id="subtitle"></p>
                    
                    <div class="sidebar-mini-news" id="mini-news">
                        <!-- Thumbs aparecem aqui apenas em alguns layouts -->
                    </div>
                </div>
            </div>

            <footer class="card-footer">
                <div class="footer-line"></div>
                <span id="site-url">WWW.NOTICIASBR.COM.BR</span>
            </footer>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
