<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headlines Snap Pro</title>
    <!-- 1. The Sacred Design CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- 2. The Editor UI CSS (Isolated) -->
    <link rel="stylesheet" href="ui-editor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="ratio-16-9">

    <aside class="sidebar-editor">
        <header class="sidebar-header">
            <h2>Snapshot Editor</h2>
            <div class="action-row">
                <button id="btn-new-project" class="btn-secondary" style="background: #0369a1;">Novo Projeto</button>
                <button id="btn-trigger-import" class="btn-secondary">Abrir (.news)</button>
            </div>
            <div class="action-row">
                <button id="btn-export-json" class="btn-secondary" style="background: #15803d;">Salvar (.news)</button>
                <input type="text" id="export-filename" placeholder="nome-do-arquivo" style="margin-bottom: 0;">
            </div>
            <div class="action-row" style="margin-top: 8px;">
                <button id="btn-export-theme" class="btn-secondary">Exp. Tema</button>
                <button id="btn-trigger-theme-import" class="btn-secondary">Imp. Tema</button>
            </div>
            
            <input type="file" id="import-json-file" accept=".news, .json" style="display: none;">
            <input type="file" id="import-theme-file" accept=".json" style="display: none;">
        </header>
        
        <div class="tabs-container">
            <details open>
                <summary>1. Identidade & Layout</summary>
                <div class="section-content">
                    <label>Formato de Saída</label>
                    <select id="layout-selector">
                        <option value="ratio-16-9">Wide (16:9)</option>
                        <option value="ratio-4-3">Clássico (4:3)</option>
                        <option value="ratio-1-1">Quadrado (1:1)</option>
                        <option value="ratio-4-5">Portrait (4:5)</option>
                        <option value="ratio-9-16">Stories (9:16)</option>
                    </select>

                    <label>Texto do Badge Topo</label>
                    <input type="text" id="edit-badge-text">

                    <div class="row">
                        <div>
                            <label>Fundo Card</label>
                            <input type="color" id="bg-card-color">
                        </div>
                        <div>
                            <label>Fundo Header</label>
                            <input type="color" id="header-color">
                        </div>
                    </div>
                    <label>Cor de Destaque</label>
                    <input type="color" id="accent-color">

                    <label>Logo (PNG)</label>
                    <input type="file" id="edit-logo" accept="image/*">
                    <label>URL / Rodapé</label>
                    <input type="text" id="edit-site-url">
                </div>
            </details>

            <details>
                <summary>2. Conteúdo Principal</summary>
                <div class="section-content">
                    <label>Foto Principal</label>
                    <input type="file" id="edit-main-img" accept="image/*">
                    <div class="row">
                        <div>
                            <label>Zoom</label>
                            <input type="range" id="edit-img-zoom" min="1" max="3" step="0.01">
                        </div>
                        <div>
                            <label>Posição Y</label>
                            <input type="range" id="edit-img-y" min="-100" max="100" step="1">
                        </div>
                    </div>
                    <label>Categoria | Local</label>
                    <input type="text" id="edit-main-cat">
                    <label>Data / Hora</label>
                    <input type="text" id="edit-main-date">
                    <label>Manchete</label>
                    <textarea id="edit-main-title" rows="2"></textarea>
                    <label>Subtítulo</label>
                    <textarea id="edit-main-sub" rows="2"></textarea>
                    <label>Texto Completo</label>
                    <textarea id="edit-main-body" rows="4"></textarea>
                </div>
            </details>

            <details>
                <summary>3. Mini Notícias</summary>
                <div class="section-content">
                    <div class="mini-edit-box">
                        <label>Notícia 1</label>
                        <input type="file" id="edit-thumb-0" accept="image/*">
                        <input type="text" id="edit-title-0" placeholder="Título">
                        <input type="text" id="edit-resumo-0" placeholder="Resumo">
                    </div>
                    <div class="mini-edit-box">
                        <label>Notícia 2</label>
                        <input type="file" id="edit-thumb-1" accept="image/*">
                        <input type="text" id="edit-title-1" placeholder="Título">
                        <input type="text" id="edit-resumo-1" placeholder="Resumo">
                    </div>
                    <div class="mini-edit-box">
                        <label>Notícia 3</label>
                        <input type="file" id="edit-thumb-2" accept="image/*">
                        <input type="text" id="edit-title-2" placeholder="Título">
                        <input type="text" id="edit-resumo-2" placeholder="Resumo">
                    </div>
                </div>
            </details>

            <details>
                <summary>4. Tipografia & Ajustes</summary>
                <div class="section-content">
                    <label style="display: flex; align-items: center; gap: 10px; background: #222; padding: 10px; border-radius: 4px;">
                        <input type="checkbox" id="global-typography-toggle" style="width: auto; margin: 0;">
                        Sincronizar Global?
                    </label>

                    <label style="margin-top: 15px;">Selecionar Elemento</label>
                    <select id="text-element-selector">
                        <option value="badge">Badge Topo</option>
                        <option value="url">URL Site</option>
                        <option value="cat">Categoria</option>
                        <option value="date">Data/Selo</option>
                        <option value="title">Manchete</option>
                        <option value="sub">Subtítulo</option>
                        <option value="body">Corpo</option>
                        <option value="mini-t">Título Mini</option>
                        <option value="mini-d">Resumo Mini</option>
                    </select>

                    <div class="row">
                        <div>
                            <label>Size</label>
                            <input type="range" id="edit-font-size" min="8" max="100" step="1">
                        </div>
                        <div>
                            <label>Cor</label>
                            <input type="color" id="edit-font-color">
                        </div>
                    </div>
                    <label style="margin-top: 15px;">Atalho Formato</label>
                    <select id="layout-selector-bottom">
                        <option value="ratio-16-9">Wide (16:9)</option>
                        <option value="ratio-4-3">Clássico (4:3)</option>
                        <option value="ratio-1-1">Quadrado (1:1)</option>
                        <option value="ratio-4-5">Portrait (4:5)</option>
                        <option value="ratio-9-16">Stories (9:16)</option>
                    </select>
                </div>
            </details>
        </div>

        <button id="btn-export-png" class="btn-primary">Baixar PNG Alta Resolução</button>
    </aside>

    <main class="preview-container">
        <div id="snapshot-stage">
            <header class="card-header">
                <img src="" id="logo-img" class="logo">
                <div class="live-badge">ÚLTIMAS NOTÍCIAS</div>
            </header>
            <div class="card-body"></div>
            <footer class="card-footer">
                <div class="accent-bar"></div>
                <span id="site-url-text"></span>
            </footer>
        </div>
    </main>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="js/state.js"></script>
    <script src="js/image-utils.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/persistence.js"></script>
    <script src="js/ui-controller.js"></script>
    <script src="app.js"></script>
</body>
</html>
