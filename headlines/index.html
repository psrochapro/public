<!-- Procure a seção 3 no seu index.html e substitua pelo conteúdo abaixo -->
<details>
    <summary>3. Cores e Layout</summary>
    <div class="section-content">
        <div class="color-grid">
            <div class="color-control">
                <label>Fundo Card</label>
                <input type="color" id="bg-card-color">
            </div>
            <div class="color-control">
                <label>Fundo Header</label>
                <input type="color" id="header-color">
            </div>
            <div class="color-control">
                <label>Destaque</label>
                <input type="color" id="accent-color">
            </div>
        </div>

        <div class="typography-box">
            <h4 class="sub-label">Ajustes de Espaçamento (Isolado)</h4>
            <div class="row">
                <div>
                    <label>Padding V (%)</label>
                    <input type="range" id="edit-padding-y" min="0" max="15" step="0.5">
                </div>
                <div>
                    <label>Padding H (%)</label>
                    <input type="range" id="edit-padding-x" min="0" max="15" step="0.5">
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Gap Principal (px)</label>
                    <input type="range" id="edit-gap-card" min="0" max="100" step="1">
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Gap Mini (px)</label>
                    <input type="range" id="edit-mini-gap" min="0" max="40" step="1">
                </div>
                <div>
                    <label>Padding Mini (px)</label>
                    <input type="range" id="edit-mini-padding" min="0" max="40" step="1">
                </div>
            </div>

            <h4 class="sub-label" style="margin-top: 20px;">Ajustes de Fontes</h4>
            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <input type="checkbox" id="global-typography-toggle" style="width: auto; margin: 0;">
                Sincronizar Fontes Global?
            </label>

            <label>Elemento para Ajustar</label>
            <select id="text-element-selector">
                <option value="badge">Badge Topo</option>
                <option value="url">URL Site</option>
                <option value="cat">Categoria</option>
                <option value="date">Data/Selo</option>
                <option value="title">Manchete</option>
                <option value="sub">Subtítulo</option>
                <option value="body">Corpo</option>
                <option value="mini-t">Título Mini</option>
                <option value="mini-d">Resumo Mini</option>
            </select>

            <div class="row">
                <div>
                    <label>Tamanho (px)</label>
                    <input type="range" id="edit-font-size" min="8" max="100" step="1">
                </div>
                <div style="max-width: 80px;">
                    <label>Cor Texto</label>
                    <input type="color" id="edit-font-color">
                </div>
            </div>
        </div>

        <label style="margin-top: 15px;">Atalho Formato (Rodapé)</label>
        <select id="layout-selector-bottom">
            <option value="ratio-16-9">Wide (16:9)</option>
            <option value="ratio-4-3">Clássico (4:3)</option>
            <option value="ratio-1-1">Quadrado (1:1)</option>
            <option value="ratio-4-5">Portrait (4:5)</option>
            <option value="ratio-9-16">Stories (9:16)</option>
        </select>
    </div>
</details>
