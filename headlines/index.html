<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Snapshot Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="ratio-16-9">

    <aside class="sidebar-editor" id="sidebar">
        <h2>Snapshot Editor</h2>
        
        <div class="control-group">
            <label>Formato de Saída</label>
            <select id="layout-selector">
                <option value="ratio-16-9">Wide (16:9)</option>
                <option value="ratio-1-1">Quadrado (1:1)</option>
                <option value="ratio-9-16">Stories (9:16)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Cor de Identidade</label>
            <input type="color" id="accent-color" value="#cc0000">
        </div>

        <div class="control-group">
            <button id="btn-toggle-ui">Ocultar Interface</button>
        </div>

        <button id="btn-export" class="btn-primary">Gerar PNG Alta Resolução</button>
    </aside>

    <main class="preview-container">
        <div id="snapshot-stage">
            
            <!-- Faixa de Identidade Superior -->
            <header class="card-header">
                <img src="" id="logo-img" class="logo">
                <div class="live-badge">AO VIVO</div>
            </header>

            <div class="card-body">
                <!-- Área da Imagem (Proporção Preservada) -->
                <div class="main-image-container">
                    <img src="" id="main-img" alt="Principal">
                    <div class="timestamp" id="image-date"></div>
                </div>

                <!-- Bloco de Texto -->
                <div class="info-container">
                    <div class="news-text">
                        <span class="category-tag" id="category"></span>
                        <h1 id="title">Manchete da Notícia</h1>
                        <p id="subtitle">O resumo da notícia aparecerá aqui garantindo legibilidade.</p>
                    </div>

                    <!-- Grid de 4 Thumbs -->
                    <div class="mini-news-grid" id="mini-news-container">
                        <!-- Injetado pelo JS -->
                    </div>
                </div>
            </div>

            <!-- Rodapé Institucional -->
            <footer class="card-footer">
                <div class="accent-bar"></div>
                <span id="site-url">WWW.NOTICIASBR.COM.BR</span>
            </footer>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
