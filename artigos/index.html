<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Artigos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <h2>Artigos e Publicações PSRochaPro</h2>
            <input type="text" id="busca-artigo" class="input-busca" placeholder="Buscar artigo por nome...">
            
            <div id="lista-artigos" class="lista-artigos">
                </div>
        </aside>

        <main class="content-viewer">
            <div id="artigo-completo" class="artigo-completo">
                <p class="placeholder-text">Selecione um artigo na barra lateral para iniciar.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
