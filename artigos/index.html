<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Artigos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="logo.png" alt="Logo do Repositório" class="repo-logo">
            </div>
            
            <h2>Artigos e Publicações</h2>
            <input type="text" id="input-busca" class="input-busca" placeholder="Buscar artigo por nome...">
            <div id="lista-artigos" class="lista-artigos"></div>
        </aside>

        <main class="content-viewer" id="content-viewer">
            <div id="artigo-completo" class="artigo-completo" style="display: none;">
                </div>

            <div id="preview-container" class="preview-glass-wrapper">
                <div id="glass-bg" class="glass-bg-blur"></div>
                
                <div class="preview-card-central">
                    <button class="nav-arrow prev-arrow" onclick="navegarArtigo(-1)">&#10094;</button>
                    <button class="nav-arrow next-arrow" onclick="navegarArtigo(1)">&#10095;</button>

                    <h2 class="preview-titulo-glass" id="preview-titulo">Selecione um Artigo</h2>
                    <img src="" alt="Headline" class="preview-headline-glass" id="preview-headline">
                    <button class="btn-ler-artigo-glass" id="btn-ler-artigo">Abrir Documento PDF</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
