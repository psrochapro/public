<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div id="preview" class="color-display"></div>
        
        <div class="controls">
            <input type="color" id="picker" value="#6366f1">
            <div class="info">
                <span class="label">HEX CODE</span>
                <code id="hex-value">#6366F1</code>
            </div>
        </div>
        <p class="hint">Click the code to copy</p>
    </main>

    <script src="app.js"></script>
</body>
</html>
