<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaCraft Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts para um look moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Chroma<span>Craft</span></h1>
            <p>Laboratório de Estilo e Cores</p>
        </header>

        <main class="main-layout">
            <!-- COLUNA ESQUERDA: CONTROLES -->
            <section class="controls-panel">
                <div class="card selector-card">
                    <label class="label">ESCOLHA A COR BASE</label>
                    <div class="picker-wrapper">
                        <input type="color" id="picker" value="#6366f1">
                        <div class="hex-display">
                            <span id="hex-value">#6366F1</span>
                            <small>Clique para copiar</small>
                        </div>
                    </div>
                </div>

                <div class="card palette-card">
                    <label class="label">VARIAÇÕES</label>
                    <div class="palette-grid">
                        <div class="swatch" id="swatch-light"></div>
                        <div class="swatch" id="swatch-main"></div>
                        <div class="swatch" id="swatch-dark"></div>
                    </div>
                </div>
            </section>

            <!-- COLUNA DIREITA: MOCKUP -->
            <section class="preview-panel">
                <label class="label">MOCKUP DE INTERFACE</label>
                <div class="mockup-card">
                    <div class="mockup-header">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="mockup-content">
                        <div class="mockup-nav"></div>
                        <div class="mockup-hero">
                            <div class="mockup-text-group">
                                <div class="line long"></div>
                                <div class="line medium"></div>
                            </div>
                            <div class="mockup-badge">Novo</div>
                        </div>
                        <div class="mockup-body">
                            <div class="mockup-item">
                                <div class="icon-box"></div>
                                <div class="line short"></div>
                            </div>
                            <button class="mockup-button">Confirmar Ação</button>
                            <p class="mockup-link">Cancelar</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
